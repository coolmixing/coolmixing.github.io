<meta charset="UTF-8">
<title>Spotify 영문명 조회</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #e0ddd8; padding: 24px; }
h1 { font-size: 18px; margin-bottom: 20px; }
.setup { background: #1a1a18; border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
.setup h2 { font-size: 14px; margin-bottom: 12px; color: #aaa; }
input { width: 100%; padding: 8px 12px; background: #111; border: 1px solid #333; border-radius: 4px; color: #fff; font-size: 13px; margin-bottom: 8px; }
button { padding: 10px 20px; background: #1DB954; border: none; border-radius: 4px; color: #000; font-size: 13px; font-weight: 600; cursor: pointer; }
button:disabled { background: #333; color: #666; cursor: not-allowed; }
.progress { margin: 16px 0; font-size: 13px; color: #aaa; }
.bar-wrap { background: #222; border-radius: 4px; height: 6px; margin-top: 8px; }
.bar { background: #1DB954; height: 6px; border-radius: 4px; transition: width .3s; }
table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 16px; }
th { background: #1a1a18; padding: 8px; text-align: left; color: #888; border-bottom: 1px solid #333; }
td { padding: 7px 8px; border-bottom: 1px solid #1a1a18; vertical-align: top; }
td.found { color: #1DB954; }
td.notfound { color: #666; }
.dl-btn { margin-top: 16px; padding: 10px 24px; background: #333; border: none; border-radius: 4px; color: #fff; font-size: 13px; cursor: pointer; }
.dl-btn:hover { background: #444; }
</style>
</head>
<body>
<h1>Spotify 영문명 자동 조회</h1>

<div class="setup">
  <h2>Spotify API 설정</h2>
  <input id="client_id" placeholder="Client ID" />
  <input id="client_secret" placeholder="Client Secret" />
  <button id="startBtn" onclick="start()">조회 시작</button>
</div>

<div class="progress" id="progress" style="display:none">
  <span id="prog-text">준비 중...</span>
  <div class="bar-wrap"><div class="bar" id="bar" style="width:0%"></div></div>
</div>

<div id="result-area" style="display:none">
  <button class="dl-btn" onclick="downloadCSV()">CSV 다운로드</button>

</div>

async function getToken(clientId, clientSecret) {
  const creds = btoa(`${clientId}:${clientSecret}`);
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Authorization': `Basic ${creds}`, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'grant_type=client_credentials'
  });
  const data = await res.json();
  return data.access_token;
}

async function searchSpotify(artist, album, token) {
  const q = encodeURIComponent(`artist:${artist} album:${album}`);
  const url = `https://api.spotify.com/v1/search?q=${q}&type=album&limit=1&market=KR`;
  try {
    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    const items = data?.albums?.items;
    if (items && items.length > 0) {
      return { enArtist: items[0].artists[0]?.name || '', enAlbum: items[0].name || '' };
    }
  } catch(e) {}
  return { enArtist: '', enAlbum: '' };
}

async function start() {
  const clientId = document.getElementById('client_id').value.trim();
  const clientSecret = document.getElementById('client_secret').value.trim();
  if (!clientId || !clientSecret) { alert('Client ID와 Secret을 입력하세요'); return; }

  document.getElementById('startBtn').disabled = true;
  document.getElementById('progress').style.display = 'block';

  try {
    token = await getToken(clientId, clientSecret);
  } catch(e) {
    alert('토큰 발급 실패: ' + e.message);
    document.getElementById('startBtn').disabled = false;
    return;
  }

  results = [];
  const tbody = document.getElementById('result-body');
  tbody.innerHTML = '';
  document.getElementById('result-area').style.display = 'block';

  for (let i = 0; i < works.length; i++) {
    const w = works[i];
    document.getElementById('prog-text').textContent = `${i+1} / ${works.length} — ${w.a}`;
    document.getElementById('bar').style.width = `${Math.round((i+1)/works.length*100)}%`;

    let enArtist = '', enAlbum = '';
    if (w.a && w.t) {
      const r = await searchSpotify(w.a, w.t, token);
      enArtist = r.enArtist;
      enAlbum = r.enAlbum;
    }

    results.push({ ...w, enArtist, enAlbum });

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${w.date}</td>
      <td>${w.a}</td>
      <td>${w.t}</td>
      <td class="${enArtist ? 'found' : 'notfound'}">${enArtist || '—'}</td>
      <td class="${enAlbum ? 'found' : 'notfound'}">${enAlbum || '—'}</td>
      <td>${w.r}</td>`;
    tbody.appendChild(tr);
    tbody.scrollTop = tbody.scrollHeight;

    await new Promise(r => setTimeout(r, 150));
  }

  document.getElementById('prog-text').textContent = `완료! ${works.length}개 검색 완료`;
  document.getElementById('startBtn').disabled = false;
}

function downloadCSV() {
  const headers = ['날짜','아티스트(KO)','앨범(KO)','아티스트(EN)','앨범(EN)','역할'];
  const rows = results.map(r => [r.date, r.a, r.t, r.enArtist, r.enAlbum, r.r].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '박혁_작품목록_영문.csv';
  a.click();
}
